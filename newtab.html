<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Tab</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --glass: rgba(255,255,255,0.07);
    --glass-border: rgba(255,255,255,0.12);
    --glass-hover: rgba(255,255,255,0.12);
    --text-primary: rgba(255,255,255,0.95);
    --text-secondary: rgba(255,255,255,0.55);
    --text-muted: rgba(255,255,255,0.35);
    --accent: #5ecfb1;
    --radius: 14px;
    --radius-sm: 10px;
  }

  html, body {
    width: 100%; height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: #0a1628;
    color: var(--text-primary);
    overflow: hidden;
  }

  /* Background layers */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 110%, #1a3a5c 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 20% 80%, #0d2a1e 0%, transparent 50%),
      linear-gradient(170deg, #0c1c32 0%, #08121f 40%, #060e18 100%);
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 15%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 35% 55%, rgba(255,255,255,0.18) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 45%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 70%, rgba(255,255,255,0.12) 0%, transparent 100%);
    z-index: 0;
  }

  /* Mountain silhouette */
  .mountain {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 55%;
    background:
      radial-gradient(ellipse 100% 100% at 50% 100%, #0d2035 0%, transparent 70%);
    z-index: 1;
    pointer-events: none;
  }
  .mountain svg {
    position: absolute;
    bottom: 0; left: 0; width: 100%; height: 100%;
  }

  /* Main layout */
  .layout {
    position: fixed; inset: 0;
    z-index: 10;
    display: grid;
    grid-template-rows: auto 1fr;
    grid-template-columns: 1fr 340px;
    gap: 0;
    padding: 28px 32px 24px;
  }

  /* ── WORLD CLOCKS ── */
  .clocks {
    grid-column: 1 / -1;
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .clock-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    padding: 10px 18px 12px;
    min-width: 130px;
    flex: 1;
    cursor: default;
    transition: background 0.2s, border-color 0.2s;
  }
  .clock-card:hover {
    background: var(--glass-hover);
    border-color: rgba(255,255,255,0.2);
  }

  .clock-city {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .clock-city .flag { font-size: 13px; }

  .clock-time {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 3px;
  }
  .clock-offset {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding-right: 32px;
  }

  .date-weather {
    margin-bottom: 28px;
  }
  .date-line {
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .weather-line {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    color: var(--text-secondary);
  }
  .weather-icon { font-size: 18px; }
  .weather-temp { font-size: 20px; font-weight: 500; color: var(--text-primary); }
  .weather-desc { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
  .weather-feels { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 32px;
    max-width: 480px;
  }
  .search-wrap svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 50px;
    padding: 12px 20px 12px 46px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    outline: none;
    transition: background 0.2s, border-color 0.2s;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus {
    background: rgba(255,255,255,0.11);
    border-color: rgba(255,255,255,0.25);
  }

  /* App shortcuts */
  .shortcuts {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }
  .shortcut {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    text-decoration: none;
  }
  .shortcut-icon {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: rgba(255,255,255,0.09);
    border: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: background 0.2s, transform 0.15s;
  }
  .shortcut:hover .shortcut-icon {
    background: rgba(255,255,255,0.16);
    transform: translateY(-2px);
  }
  .shortcut-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
  }

  /* Settings */
  .settings-btn {
    margin-top: auto;
    padding-top: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    width: fit-content;
    transition: color 0.2s;
    background: none;
    border: none;
    font-family: inherit;
  }
  .settings-btn:hover { color: var(--text-secondary); }
  .settings-btn svg { opacity: 0.7; }

  /* ── RIGHT PANEL: TASKS ── */
  .tasks-panel {
    background: rgba(15,25,40,0.65);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 20px 20px 16px;
    display: flex;
    flex-direction: column;
    max-height: 360px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    align-self: start;
  }

  .tasks-header {
    margin-bottom: 4px;
  }
  .tasks-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .tasks-subtitle {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
  }

  .task-list {
    list-style: none;
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }

  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 6px;
  }
  .task-item:hover { background: rgba(255,255,255,0.04); }
  .task-item:last-child { border-bottom: none; }

  .task-check {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
    flex-shrink: 0;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    cursor: pointer;
  }
  .task-check.done {
    background: var(--accent);
    border-color: var(--accent);
  }
  .task-check.done::after {
    content: '';
    position: absolute;
    left: 3px; top: 1px;
    width: 5px; height: 8px;
    border: 1.5px solid #0a1628;
    border-top: none; border-left: none;
    transform: rotate(45deg);
  }
  .task-item:hover .task-check:not(.done) { border-color: rgba(255,255,255,0.5); }

  .task-info { flex: 1; min-width: 0; }
  .task-name {
    font-size: 13px;
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-primary);
    transition: color 0.2s;
  }
  .task-item.done-item .task-name {
    color: var(--text-muted);
    text-decoration: line-through;
  }
  .task-tag {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .task-star {
    font-size: 13px;
    opacity: 0.25;
    cursor: pointer;
    transition: opacity 0.2s;
    flex-shrink: 0;
    background: none;
    border: none;
    color: inherit;
    padding: 2px;
  }
  .task-star:hover, .task-star.starred { opacity: 0.85; }
  .task-star.starred { color: #f5c36a; }

  .task-add {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .task-add-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    transition: color 0.2s;
    padding: 0;
  }
  .task-add-btn:hover { color: var(--text-secondary); }

  .task-calendar {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    padding: 4px;
    transition: color 0.2s;
  }
  .task-calendar:hover { color: var(--text-secondary); }

  /* Scrollbar style */
  .task-list::-webkit-scrollbar { width: 3px; }
  .task-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  /* Task input */
  .task-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .task-new-input {
    flex: 1;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-primary);
    outline: none;
  }
  .task-new-input::placeholder { color: var(--text-muted); }
</style>
</head>
<body>

<!-- Mountain background -->
<div class="mountain">
  <svg viewBox="0 0 1440 400" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="mt1" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#16304d"/>
        <stop offset="100%" stop-color="#08131e"/>
      </linearGradient>
      <linearGradient id="mt2" x1="0" y1="0" x2="0" y2="1">

      </linearGradient>

      </linearGradient>

    <polygon points="0,280 120,180 260,220 380,140 500,200 600,160 720,100 840,160 960,130 1080,180 1200,140 1340,190 1440,160 1440,400 0,400" fill="url(#mt1)" opacity="0.7"/>
    <!-- Mid mountains -->
    <polygon points="0,320 100,240 220,270 350,200 480,250 580,210 680,170 780,220 900,180 1020,220 1140,190 1260,230 1380,200 1440,220 1440,400 0,400" fill="url(#mt2)" opacity="0.85"/>

    <polygon points="0,380 180,310 360,340 540,290 720,340 900,300 1080,340 1260,310 1440,340 1440,400 0,400" fill="url(#mt3)"/>

<div class="layout">

  <!-- World Clocks -->
  <div class="clocks" id="clocks"></div>

  <!-- Left panel -->
  <div class="left-panel">

        <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input class="search-input" type="text" placeholder="Search Google or type a URL" id="searchInput" autocomplete="off"/>
    </div>

    <div class="shortcuts" id="shortcuts"></div>

    <button class="settings-btn" onclick="alert('Settings coming soon!')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>

  </div>

  <!-- Tasks panel -->
  <div class="tasks-panel">
    <div class="tasks-header">
      <div class="tasks-title">Today's Task</div>
      <div class="tasks-subtitle">Personal · Work</div>
    </div>
    <ul class="task-list" id="taskList"></ul>
    <div class="task-add">
      <button class="task-add-btn" onclick="showTaskInput()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <line x1="6" y1="1" x2="6" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="1" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Add a task
      </button>
      <button class="task-calendar" title="Calendar view">

          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const CLOCKS = [
  { city: 'Colombo',   flag: '🇱🇰', tz: 'Asia/Colombo' },
  { city: 'Melbourne', flag: '🇦🇺', tz: 'Australia/Melbourne' },
  { city: 'Singapore', flag: '🇸🇬', tz: 'Asia/Singapore' },
  { city: 'Dubai',     flag: '🇦🇪', tz: 'Asia/Dubai' },
  { city: 'Halifax',   flag: '🇨🇦', tz: 'America/Halifax' },
  { city: 'Vancouver', flag: '🇨🇦', tz: 'America/Vancouver' },
];

const SHORTCUTS = [
  { label: 'Facebook',  url: 'https://facebook.com',  emoji: '🔵' },
  { label: 'YouTube',   url: 'https://youtube.com',   emoji: '🔴' },
  { label: 'WhatsApp',  url: 'https://web.whatsapp.com', emoji: '🟢' },
  { label: 'Netflix',   url: 'https://netflix.com',   emoji: '⬛' },
  { label: 'Gmail',     url: 'https://mail.google.com', emoji: '📧' },
];

const DEFAULT_TASKS = [
  { id: 1, name: 'Do the laundry',                   tag: 'HOME',              done: false, starred: false },
  { id: 2, name: 'UI Design for new chrome extension', tag: 'PERSONAL PROJECTS', done: false, starred: false },
  { id: 3, name: 'Pay the electricity bill',          tag: 'HOME',              done: false, starred: false },
  { id: 4, name: 'Update portfolio',                  tag: 'PERSONAL PROJECTS', done: false, starred: false },
  { id: 5, name: 'Research: React.js video calling',  tag: 'NAVIGATE',          done: false, starred: false },
  { id: 6, name: 'Fix notification dismiss issue',    tag: 'NAVIGATE',          done: false, starred: false },
];

// ── STATE ────────────────────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('nt_tasks') || 'null') || DEFAULT_TASKS;
function saveTasks() { localStorage.setItem('nt_tasks', JSON.stringify(tasks)); }

// ── SHORTCUTS ───────────────────────────────────────────
const iconColors = {
  '🔵': '#1877f2', '🔴': '#ff0000', '🟢': '#25d366', '⬛': '#e50914', '📧': '#ea4335'
};
const iconLetters = {
  '🔵': 'f', '🔴': '▶', '🟢': 'W', '⬛': 'N', '📧': 'M'
};

function renderShortcuts() {
  const el = document.getElementById('shortcuts');
  el.innerHTML = SHORTCUTS.map(s => `
    <a class="shortcut" href="${s.url}" target="_blank">
      <div class="shortcut-icon" style="background:${iconColors[s.emoji]}22; border-color:${iconColors[s.emoji]}33;">
        <span style="color:${iconColors[s.emoji]};font-size:20px;font-weight:700;font-family:sans-serif;">${iconLetters[s.emoji]}</span>
      </div>
      <span class="shortcut-label">${s.label}</span>
    </a>
  `).join('');
}
renderShortcuts();

// ── CLOCKS ───────────────────────────────────────────────
const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;

function getOffsetLabel(tz) {
  const now = new Date();
  const local = now.getTime() + now.getTimezoneOffset() * 60000;
  const target = new Date(now.toLocaleString('en-US', { timeZone: tz }));
  const diff = Math.round((target - new Date(now.toLocaleString('en-US', { timeZone: localTz }))) / 3600000);
  const sign = diff >= 0 ? '+' : '';
  return `${sign}${diff}:00`;
}

function isDayDiff(tz) {
  const now = new Date();
  const localDay = new Date(now.toLocaleString('en-US', { timeZone: localTz })).getDate();
  const targetDay = new Date(now.toLocaleString('en-US', { timeZone: tz })).getDate();
  const diff = targetDay - localDay;
  if (diff === 0) return 'Today';
  if (diff === 1 || diff < -25) return 'Tomorrow';
  return 'Yesterday';
}

function formatClockTime(tz) {
  return new Date().toLocaleTimeString('en-US', { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: true });
}

function renderClocks() {
  const el = document.getElementById('clocks');
  el.innerHTML = CLOCKS.map(c => `
    <div class="clock-card">
      <div class="clock-city"><span class="flag">${c.flag}</span>${c.city}</div>
      <div class="clock-time" id="ct_${c.city.replace(/\s/,'')}">${formatClockTime(c.tz)}</div>
      <div class="clock-offset">${isDayDiff(c.tz)}, ${getOffsetLabel(c.tz)}</div>
    </div>
  `).join('');
}
renderClocks();

function tickClocks() {
  CLOCKS.forEach(c => {
    const el = document.getElementById('ct_' + c.city.replace(/\s/,''));
    if (el) el.textContent = formatClockTime(c.tz);
  });
}
setInterval(tickClocks, 1000);

// ── DATE ─────────────────────────────────────────────────
function updateDate() {
  const d = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('dateDisplay').textContent =
    `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
}
updateDate();
setInterval(updateDate, 60000);

// ── WEATHER ──────────────────────────────────────────────
async function fetchWeather() {
  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, { timeout: 5000 })
    );
    const { latitude: lat, longitude: lon } = pos.coords;
    const r = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=apparent_temperature,weathercode&timezone=auto&forecast_days=1`
    );
    const d = await r.json();
    const temp = Math.round(d.current_weather.temperature);
    const feels = Math.round(d.hourly.apparent_temperature[new Date().getHours()]);
    const codes = { 0:'Clear',1:'Mostly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Icy fog',51:'Drizzle',53:'Drizzle',55:'Drizzle',61:'Rain',63:'Rain',65:'Heavy rain',71:'Snow',73:'Snow',75:'Heavy snow',80:'Showers',81:'Showers',82:'Heavy showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm' };
    const wc = d.current_weather.weathercode;
    document.getElementById('tempDisplay').textContent = `${temp}°C`;
    document.getElementById('weatherDesc').textContent = codes[wc] || 'Cloudy';
    document.getElementById('weatherFeels').textContent = `Feels like ${feels}°C`;
    const icons = { 0:'☀',1:'🌤',2:'⛅',3:'☁',45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌦',61:'🌧',63:'🌧',65:'🌧',71:'🌨',73:'🌨',75:'🌨',80:'🌦',81:'🌦',82:'⛈',95:'⛈',96:'⛈',99:'⛈' };
    document.querySelector('.weather-icon').textContent = icons[wc] || '☁';
  } catch {
    document.getElementById('weatherDesc').textContent = 'Location unavailable';
    document.getElementById('weatherFeels').textContent = 'Enable location for weather';
  }
}
fetchWeather();

// ── SEARCH ───────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = e.target.value.trim();
    if (!q) return;
    const url = q.includes('.') && !q.includes(' ') ? (q.startsWith('http') ? q : 'https://' + q) : `https://www.google.com/search?q=${encodeURIComponent(q)}`;
    window.location.href = url;
  }
});

// ── TASKS ────────────────────────────────────────────────
function renderTasks() {
  const el = document.getElementById('taskList');
  el.innerHTML = tasks.map(t => `
    <li class="task-item${t.done ? ' done-item' : ''}" data-id="${t.id}">
      <div class="task-check${t.done ? ' done' : ''}" onclick="toggleTask(${t.id})"></div>
      <div class="task-info">
        <div class="task-name">${t.name}</div>
        <div class="task-tag">${t.tag}</div>
      </div>
      <button class="task-star${t.starred ? ' starred' : ''}" onclick="toggleStar(${t.id})">★</button>
    </li>
  `).join('');
}
renderTasks();

function toggleTask(id) {
  tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
  saveTasks(); renderTasks();
}
function toggleStar(id) {
  tasks = tasks.map(t => t.id === id ? {...t, starred: !t.starred} : t);
  saveTasks(); renderTasks();
}

function showTaskInput() {
  const list = document.getElementById('taskList');
  const li = document.createElement('li');
  li.className = 'task-input-row';
  li.innerHTML = `<div class="task-check"></div><input class="task-new-input" placeholder="New task…" autofocus/>`;
  list.prepend(li);
  const inp = li.querySelector('input');
  inp.focus();
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && inp.value.trim()) {
      tasks.unshift({ id: Date.now(), name: inp.value.trim(), tag: 'PERSONAL', done: false, starred: false });
      saveTasks(); renderTasks();
    }
    if (e.key === 'Escape' || e.key === 'Enter') renderTasks();
  });
  inp.addEventListener('blur', () => setTimeout(renderTasks, 150));
}
</script>
